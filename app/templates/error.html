{% extends "base.html" %}
{% block content %}
<div class="relative mx-auto max-w-xl overflow-hidden rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-sm dark:border-white/10 dark:bg-[#070b23]">
  <div class="pointer-events-none absolute inset-0 hidden dark:block">
    <div class="absolute left-[-10%] top-[-10%] h-40 w-40 rounded-full bg-blue-500/15 blur-3xl"></div>
    <div class="absolute right-[-12%] bottom-[-14%] h-44 w-44 rounded-full bg-fuchsia-500/12 blur-3xl"></div>
  </div>
  <div class="relative">
  <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-cyan-200">Error {{ code }}</p>
  <h1 class="mt-2 text-3xl font-semibold tracking-tight text-black dark:text-white">Request could not be completed</h1>
  <p class="mt-3 text-sm text-slate-600 dark:text-white/75">{{ message }}</p>
  <a href="{{ url_for('home') }}" class="mt-6 inline-block rounded-full border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-black transition hover:bg-slate-100 dark:border-white/15 dark:bg-white/5 dark:text-white dark:hover:bg-white/10">Back to Home</a>
  </div>
</div>
{% endblock %}
