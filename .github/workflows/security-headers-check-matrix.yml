name: Security Headers Check (Staging + Production)

on:
  workflow_dispatch:
    inputs:
      run_staging:
        description: 'Run staging checks'
        required: false
        type: boolean
        default: true
      run_production:
        description: 'Run production checks'
        required: false
        type: boolean
        default: true
  schedule:
    - cron: '45 3 * * *' # Daily at 03:45 UTC

permissions:
  contents: read
  issues: write

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    env:
      STAGING_URL_VAR: ${{ vars.SECURITY_CHECK_STAGING_URL }}
      PROD_URL_VAR: ${{ vars.SECURITY_CHECK_PRODUCTION_URL }}
      STAGING_URL_SECRET: ${{ secrets.SECURITY_CHECK_STAGING_URL }}
      PROD_URL_SECRET: ${{ secrets.SECURITY_CHECK_PRODUCTION_URL }}
      STAGING_CF_VAR: ${{ vars.SECURITY_CHECK_STAGING_CLOUDFLARE }}
      PROD_CF_VAR: ${{ vars.SECURITY_CHECK_PRODUCTION_CLOUDFLARE }}
    steps:
      - id: build
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"
          run_staging="true"
          run_production="true"
          if [[ "$event_name" == "workflow_dispatch" ]]; then
            run_staging="${{ github.event.inputs.run_staging || 'true' }}"
            run_production="${{ github.event.inputs.run_production || 'true' }}"
          fi

          staging_url="${STAGING_URL_VAR:-}"
          [[ -z "$staging_url" ]] && staging_url="${STAGING_URL_SECRET:-}"
          prod_url="${PROD_URL_VAR:-}"
          [[ -z "$prod_url" ]] && prod_url="${PROD_URL_SECRET:-}"

          staging_cf="${STAGING_CF_VAR:-false}"
          prod_cf="${PROD_CF_VAR:-false}"

          entries=()

          if [[ "$run_staging" == "true" ]]; then
            if [[ -z "$staging_url" ]]; then
              echo "Staging requested but SECURITY_CHECK_STAGING_URL not configured" >&2
              exit 1
            fi
            entries+=("{\"name\":\"staging\",\"url\":\"$staging_url\",\"cloudflare\":$([[ "$staging_cf" == "true" ]] && echo true || echo false)}")
          fi

          if [[ "$run_production" == "true" ]]; then
            if [[ -z "$prod_url" ]]; then
              echo "Production requested but SECURITY_CHECK_PRODUCTION_URL not configured" >&2
              exit 1
            fi
            entries+=("{\"name\":\"production\",\"url\":\"$prod_url\",\"cloudflare\":$([[ "$prod_cf" == "true" ]] && echo true || echo false)}")
          fi

          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "No matrix targets selected." >&2
            exit 1
          fi

          json='{"include":['
          for i in "${!entries[@]}"; do
            [[ "$i" -gt 0 ]] && json+=','
            json+="${entries[$i]}"
          done
          json+=']}'

          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "Resolved matrix: $json"

  security-check:
    runs-on: ubuntu-latest
    needs: resolve-matrix
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x verify_security.sh verify_security_json.sh verify_security_report.sh

      - name: Run security JSON verification (${{ matrix.name }})
        id: verify_json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/${{ matrix.name }}
          OUT_JSON="reports/${{ matrix.name }}/security_report.json"
          CF_FLAG=""
          if [[ "${{ matrix.cloudflare }}" == "true" ]]; then
            CF_FLAG="--cloudflare"
          fi
          set +e
          ./verify_security_json.sh "${{ matrix.url }}" $CF_FLAG --out "$OUT_JSON"
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "json_path=$OUT_JSON" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate markdown security report (${{ matrix.name }})
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/${{ matrix.name }}
          OUT_MD="reports/${{ matrix.name }}/security_report.md"
          CF_FLAG=""
          if [[ "${{ matrix.cloudflare }}" == "true" ]]; then
            CF_FLAG="--cloudflare"
          fi
          set +e
          ./verify_security_report.sh "${{ matrix.url }}" $CF_FLAG --out "$OUT_MD"
          REPORT_EXIT=$?
          set -e
          echo "Markdown report generated for ${{ matrix.name }} (exit=$REPORT_EXIT)"

      - name: Upload security reports (${{ matrix.name }})
        id: upload_reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ matrix.name }}-${{ github.run_number }}
          path: reports/${{ matrix.name }}/
          if-no-files-found: warn
          retention-days: 14

      - name: Create GitHub issue on failure (${{ matrix.name }})
        if: always() && steps.verify_json.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ steps.verify_json.outputs.json_path }}';
            let report = null;
            try {
              if (fs.existsSync(path)) {
                report = JSON.parse(fs.readFileSync(path, 'utf8'));
              }
            } catch (e) {
              core.warning(`Unable to parse JSON report: ${e.message}`);
            }

            const envName = '${{ matrix.name }}';
            const target = report?.target || '${{ matrix.url }}';
            const status = report?.status || 'FAIL';
            const counts = report?.counts || {};
            const failItems = report?.results?.fail || [];
            const warnItems = report?.results?.warn || [];
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactsPageUrl = `${runUrl}#artifacts`;
            const artifactId = '${{ steps.upload_reports.outputs[''artifact-id''] }}';
            const artifactDirectUrl = artifactId
              ? `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifactId}`
              : null;

            function computeSeverity(fails, failList) {
              const joined = (failList || []).join(' | ').toLowerCase();
              const criticalTerms = [
                'https redirect',
                'content-security-policy',
                'strict-transport-security',
                'hsts',
                'x-frame-options',
                'referrer-policy'
              ];
              const hasCritical = criticalTerms.some(term => joined.includes(term));
              if (hasCritical || (fails ?? 0) >= 3) return 'High';
              if ((fails ?? 0) >= 1) return 'Medium';
              return 'Low';
            }
            const severity = computeSeverity(counts.fail, failItems);
            const title = `[${severity}] [Security Check Failure][${envName}] ${target}`;

            const body = [
              `## [${severity}] Automated Security Verification Failure (Matrix)`,
              '',
              `- **Environment**: \`${envName}\``,
              `- **Target**: \`${target}\``,
              `- **Status**: **${status}**`,
              `- **Severity**: **${severity}**`,
              `- **Workflow**: \`${context.workflow}\``,
              `- **Run**: ${runUrl}`,
              `- **Commit**: \`${context.sha}\``,
              '',
              '### Counts',
              '',
              `- PASS: ${counts.pass ?? 'n/a'}`,
              `- WARN: ${counts.warn ?? 'n/a'}`,
              `- FAIL: ${counts.fail ?? 'n/a'}`,
              '',
              '### Failed Checks',
              '',
              ...(failItems.length ? failItems.map(x => `- ${x}`) : ['- See uploaded artifact for details']),
              '',
              '### Warnings',
              '',
              ...(warnItems.length ? warnItems.map(x => `- ${x}`) : ['- None']),
              '',
              '### Artifacts',
              '',
              `- Artifacts page: ${artifactsPageUrl}`,
              ...(artifactDirectUrl ? [`- Direct artifact link: ${artifactDirectUrl}`] : []),
              `- Artifact name: \`security-reports-${envName}-${context.runNumber}\``,
              '',
              '_This issue was created automatically by the security header check matrix workflow._'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security-automation',
              per_page: 100,
            });
            const existing = issues.find(i =>
              i.title.includes('[Security Check Failure]') &&
              i.title.includes(`[${envName}]`) &&
              i.title.includes(target)
            );
            if (existing) {
              core.info(`Open issue already exists: #${existing.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `New matrix failure detected in run ${runUrl} (Severity: **${severity}**)\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security-automation', 'security'],
              });
            }

      - name: Fail job if security checks failed (${{ matrix.name }})
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          EXIT_CODE="${{ steps.verify_json.outputs.exit_code }}"
          if [[ -z "$EXIT_CODE" ]]; then
            echo "Missing verification exit code for ${{ matrix.name }}; treating as failure." >&2
            exit 1
          fi
          if [[ "$EXIT_CODE" != "0" ]]; then
            echo "Security verification failed for ${{ matrix.name }} with exit code $EXIT_CODE" >&2
            exit "$EXIT_CODE"
          fi
          echo "Security verification passed for ${{ matrix.name }}."
