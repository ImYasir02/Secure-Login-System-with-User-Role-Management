# /etc/nginx/sites-available/secure_login.conf
# Assumes Cloudflare -> Nginx -> Gunicorn (Python app)
# Optional high-traffic mode: put Varnish between Cloudflare and Nginx.

# Rate limiting (basic DDoS mitigation)
limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

upstream secure_login_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Cloudflare real IP restore (update list regularly)
# include /etc/nginx/cloudflare-realip.conf;
# Example if using include file contents:
# real_ip_header CF-Connecting-IP;
# set_real_ip_from 173.245.48.0/20;
# ... (all Cloudflare IP ranges)

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    server_tokens off;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;
    server_tokens off;

    # TLS certs (Let's Encrypt / origin cert)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Optional OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    resolver_timeout 5s;

    root /opt/secure_login;
    client_max_body_size 5m;
    keepalive_timeout 30;

    # Security headers (MANDATORY)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https: 'unsafe-inline'; style-src 'self' https: 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https: data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # Performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
    # Brotli (if nginx-brotli module installed)
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Rate limiting / connection limiting
    limit_req zone=one burst=20 nodelay;
    limit_conn addr 50;

    # Hide upstream info
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    fastcgi_hide_header X-Powered-By;

    # Static files cache (if moved to app/static in production path and served directly)
    location /app/static/ {
        alias /opt/secure_login/app/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Sensitive routes should never be cached by proxies
    location ~ ^/(login|login-2fa|logout|register|forgot-password|reset-password|settings|security-settings) {
        add_header Cache-Control "no-store" always;
        proxy_pass http://secure_login_app;
        include /etc/nginx/proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://secure_login_app;
        include /etc/nginx/proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        add_header Cache-Control "no-cache" always;
    }

    # Block common probes
    location ~* /(\.env|\.git|composer\.(json|lock)|package\.json|wp-login\.php|xmlrpc\.php) {
        deny all;
        return 404;
    }
}
